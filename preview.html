<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Website của tôi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
    }
    main {
      padding: 30px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

<header>
  <h1>🚀 Website đầu tiên của tôi</h1>
</header>

<main>
  <p>Chúc mừng! Website của bạn đã hoạt động.</p>
  <button onclick="sayHello()">Bấm vào đây</button>
</main>

<script>
  function sayHello() {
    alert("Xin chào! Bạn đã click nút 🎉");
  }
</script>

</body>
</html>
